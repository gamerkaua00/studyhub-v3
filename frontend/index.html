<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyHub IFPR</title>
    <link rel="manifest" href="/studyhub-v3/manifest.json" />
    <meta name="theme-color" content="#5865F2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="StudyHub" />
    <meta name="description" content="Sistema de gerenciamento de estudos do IFPR" />
    <script>
      (function(l){if(l.search[1]==="/"){var d=l.search.slice(1).split("&").map(function(s){return s.replace(/~and~/g,"&")}).join("?");window.history.replaceState(null,null,l.pathname.slice(0,-1)+d+l.hash)}}(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/studyhub-v3/sw.js").catch(()=>{})})}
    </script>
  </body>
</html>
